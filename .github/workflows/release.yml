name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build FocusLens
        run: |
          pyinstaller scripts/FocusLens.spec --distpath dist

      - name: Build Updater
        run: |
          pyinstaller --onefile --windowed --name FocusLensUpdater --distpath dist scripts/updater.py

      - name: Create release zip
        run: |
          cd dist/FocusLens
          powershell Compress-Archive -Path * -DestinationPath ../../FocusLens_${{ github.ref_name }}.zip

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FocusLens_${{ github.ref_name }}.zip
            dist/FocusLensUpdater.exe
          generate_release_notes: true
          fail_on_unmatched_files: false
